name: Promote label guard
on:
  pull_request_target:
    types: [labeled]
permissions:
  pull-requests: write
  issues: write
jobs:
  guard:
    if: github.event.label.name == 'promote'
    runs-on: ubuntu-latest
    steps:
      - name: Reject unauthorized promote label
        if: github.event.sender.login != 'lucvanrhyn'
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.payload.sender.login;
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: 'promote',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `Removed \`promote\` label applied by \`@${actor}\`. Only @lucvanrhyn can apply this label — see [tasks/promote-runbook.md](../blob/main/tasks/promote-runbook.md).`,
            });
            core.setFailed(`promote label applied by unauthorized actor: ${actor}`);
      - name: Accept authorized promote label
        if: github.event.sender.login == 'lucvanrhyn'
        run: echo "promote label applied by lucvanrhyn — allowed."
