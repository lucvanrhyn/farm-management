name: audit-species-where

# Structural lint that enforces the ADR-0005 species-access invariant:
# the four species-bearing models (Animal, Camp, Mob, Observation) may be
# reached on a tenant code path ONLY through the two named doors in
# `lib/server/species-scoped-prisma.ts` — `scoped(prisma, mode)` (per-
# species) or `crossSpecies(prisma, reason)` (deliberate cross-species).
#
# A raw `prisma.<species-model>.<op>` (findMany/findFirst/count/groupBy/
# updateMany/deleteMany) outside a structural door-module exemption is the
# silent cross-species-leak bug class — no exception, no failing test.
#
# ADR-0005's final wave (#353) replaced the content-inspecting
# `scripts/audit-species-where.ts` script + `.audit-species-where-baseline
# .json` + `audit-allow-species-where:` pragma with a single structural
# architecture test modelled on
# `__tests__/architecture/sync-truth-no-direct-callers.test.ts`
# (ADR-0002's invariant): presence of a NAMED DOOR, not presence of a
# `where` key. The test is binary — there is no baseline to grandfather.
#
# The workflow filename and the check/job name `audit-species-where` are
# kept byte-identical because branch protection pins the status-check
# context string; only the underlying command changed.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  audit-species-where:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Species-access invariant — structural arch test
        run: npx vitest run __tests__/architecture/species-access-no-direct-prisma.test.ts
