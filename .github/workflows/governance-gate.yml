name: Governance gate
# Runs on every PR to main. Provisions a per-branch Turso DB clone, builds the
# app, runs Vitest, then runs a Playwright smoke spec against the built app.
# Upstream CLI project: tursodatabase/turso-cli (installed via curl below).
on:
  pull_request:
    branches: [main]
defaults:
  run:
    shell: bash -eo pipefail {0}
jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      META_TURSO_URL: ${{ secrets.META_TURSO_URL }}
      META_TURSO_AUTH_TOKEN: ${{ secrets.META_TURSO_AUTH_TOKEN }}
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      BRANCH_CLONE_SOURCE_DB: ${{ vars.BRANCH_CLONE_SOURCE_DB || 'basson-boerdery-dub' }}
      BRANCH_CLONE_GROUP: ${{ vars.BRANCH_CLONE_GROUP || 'eu-dub' }}
    steps:
      - uses: actions/checkout@v4
        # `fetch-depth: 0` makes `origin/main` reachable inside the runner.
        # The schema-parity step (below) compares tenant `_migrations`
        # against the migration set merged on `origin/main`, NOT the PR
        # branch — so any PR that adds a new migration doesn't fail by
        # construction. Without `fetch-depth: 0` the script falls back to
        # the working tree and the gate reverts to the pre-fix behavior.
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Turso CLI
        run: curl -sSfL https://get.tur.so/install.sh | bash && echo "$HOME/.turso" >> $GITHUB_PATH

      - name: Apply meta-DB migrations
        # Required before "Provision branch clone": cloneBranch reads
        # `branch_db_clones.head_sha`/`soak_started_at` (added by
        # meta-migrations/0001) to enforce per-commit soak. Without this step,
        # every gate run on a meta-DB schema not yet at HEAD would fail with
        # "no column named head_sha". Idempotent — already-applied migrations
        # are skipped via `_meta_migrations` tracking table.
        run: pnpm tsx scripts/migrate.ts --meta-only

      - name: Provision branch clone
        id: clone
        # `--silent` suppresses pnpm's script-header lines so stdout is pure JSON.
        run: pnpm --silent ops:clone-branch "${{ github.head_ref }}" --source "$BRANCH_CLONE_SOURCE_DB" --group "$BRANCH_CLONE_GROUP" | tee clone-output.json

      - name: Mint clone auth token + export env
        run: |
          DB_NAME=$(jq -r .tursoDbName clone-output.json)
          DB_URL=$(jq -r .tursoDbUrl clone-output.json)
          if [ -z "$DB_NAME" ] || [ "$DB_NAME" = "null" ]; then
            echo "::error::tursoDbName missing from clone-output.json" >&2
            exit 1
          fi
          if [ -z "$DB_URL" ] || [ "$DB_URL" = "null" ]; then
            echo "::error::tursoDbUrl missing from clone-output.json" >&2
            exit 1
          fi
          # Branch-clone CLI omits the auth token from stdout for log safety;
          # mint a fresh non-expiring token for the gate's runtime.
          TOKEN=$(turso db tokens create "$DB_NAME" --expiration none)
          echo "::add-mask::$TOKEN"
          {
            echo "TURSO_DATABASE_URL=$DB_URL"
            echo "TURSO_AUTH_TOKEN=$TOKEN"
          } >> "$GITHUB_ENV"

      - name: Generate Prisma client
        # Vitest imports server modules that pull in @prisma/client; the
        # generated client needs to exist before the suite runs.
        run: pnpm prisma generate

      - name: Schema parity check (PRD #128)
        # Verifies every prod tenant's `_migrations` table is in lock-step
        # with the migrations shipped in this PR. Catches the "tenant fell
        # behind on a previous promote" scenario at PR time.
        # `--fail-on-drift` makes CI fail when any tenant is missing a
        # migration. Drops the secret check when META_TURSO_URL is absent
        # so forks without secrets still pass.
        if: env.META_TURSO_URL != ''
        run: pnpm ops:audit-schema-parity --fail-on-drift

      - name: Vitest
        run: pnpm test

      - name: Build (prisma + eslint + next)
        run: pnpm build

      - name: Start server
        run: nohup pnpm start > server.log 2>&1 & echo $! > server.pid

      - name: Wait for server
        run: pnpm dlx wait-on http://localhost:3000 --timeout 60000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke + admin journey (PRD #128)
        # `pnpm smoke` runs every spec listed in playwright.config.ts —
        # which now includes admin-journey.spec.ts (the authenticated walk
        # through the 8 routes that crashed on prod after Phase A).
        # The journey self-skips when E2E_IDENTIFIER / E2E_PASSWORD are
        # unset, so this step is safe even on forks without secrets.
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_IDENTIFIER: ${{ secrets.SYNTHETIC_USER_EMAIL }}
          E2E_PASSWORD: ${{ secrets.SYNTHETIC_USER_PASSWORD }}
          E2E_TENANT_SLUG: ${{ vars.SYNTHETIC_TENANT_SLUG || 'basson-boerdery' }}
        run: pnpm smoke

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
