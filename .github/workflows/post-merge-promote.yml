name: Post-merge promote
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  promote:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'promote')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Wave 4 A1 (2026-05-02): PROD_TENANT_DB_URL / PROD_TENANT_DB_AUTH_TOKEN
      # were dropped — promote now enumerates every tenant from the meta-DB
      # via runProdMigrationsAllTenants. Per-tenant creds are read from the
      # `farms` table on each run, so a single META_* pair is sufficient.
      META_TURSO_URL: ${{ secrets.META_TURSO_URL }}
      META_TURSO_AUTH_TOKEN: ${{ secrets.META_TURSO_AUTH_TOKEN }}
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Turso CLI
        run: curl -sSfL https://get.tur.so/install.sh | bash && echo "$HOME/.turso" >> $GITHUB_PATH

      - name: Detect ESCALATED path touches
        id: escalated
        # Issue #178 conditional-soak gate. Only `lib/migrator.ts` and
        # `lib/ops/branch-clone.ts` trigger the 30-min soak floor —
        # everything else relies on the synchronous backstops from PRD #128
        # (verifyMigrationApplied #141, parity audit #137, no-select #140).
        # Re-enable blanket soak: replace this step with `echo touched=true`.
        run: |
          set -eo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          # The runner has a shallow clone; fetch the base SHA explicitly.
          git fetch --depth=1 origin "$BASE_SHA" 2>/dev/null || true
          if git diff --name-only "$BASE_SHA" "$MERGE_SHA" | \
             grep -qE '^(lib/migrator\.ts|lib/ops/branch-clone\.ts)$'; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            echo "ESCALATED paths touched — soak gate enforced (30 min floor)."
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
            echo "Pure-transport PR — soak gate SKIPPED (backstops cover all classes)."
          fi

      - name: Promote branch to prod
        id: promote
        run: pnpm ops:promote-branch "$BRANCH_NAME" --escalated-paths-touched=${{ steps.escalated.outputs.touched }}

      - name: Post-promote authenticated smoke (PRD #128)
        # Runs the 8-route authenticated GET sweep against the live deploy
        # immediately after migrations applied. If any route returns 500 /
        # the global error boundary / React's generic crash UI, the next
        # step rolls back the meta-DB `promoted_at` row and reopens the PR
        # with a `prod-smoke-failed` label.
        id: smoke
        if: success() && env.SYNTHETIC_USER_EMAIL != ''
        env:
          BASE_URL: ${{ vars.SYNTHETIC_BASE_URL || 'https://farm-management-lilac.vercel.app' }}
          TENANT_SLUG: ${{ vars.SYNTHETIC_TENANT_SLUG || 'basson-boerdery' }}
          SYNTHETIC_USER_EMAIL: ${{ secrets.SYNTHETIC_USER_EMAIL }}
          SYNTHETIC_USER_PASSWORD: ${{ secrets.SYNTHETIC_USER_PASSWORD }}
        run: |
          pnpm ops:post-promote-smoke \
            --base "$BASE_URL" \
            --tenant "$TENANT_SLUG" \
            --identifier "$SYNTHETIC_USER_EMAIL" \
            --password "$SYNTHETIC_USER_PASSWORD" \
            --json-report smoke-report.json

      - name: Rollback promote on smoke failure (PRD #128)
        if: failure() && steps.promote.outcome == 'success' && steps.smoke.outcome == 'failure'
        run: pnpm ops:rollback-promote --branch "$BRANCH_NAME"

      - name: Reopen PR + label on smoke failure
        if: failure() && steps.promote.outcome == 'success' && steps.smoke.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['prod-smoke-failed', 'incident'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🚨 Post-promote smoke FAILED for \`${branch}\`. Meta-DB row was rolled back to un-promoted. Run: ${runUrl}\n\nFix the regression and re-add the \`promote\` label to retry. PRD: #128.`,
            });

      - name: Comment success on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `✅ Promoted \`${process.env.BRANCH_NAME}\` to prod at ${new Date().toISOString()}.`
            });
            await core.summary
              .addHeading('Promote succeeded')
              .addRaw(`Branch \`${process.env.BRANCH_NAME}\` promoted to prod at ${new Date().toISOString()}.`)
              .write();

      - name: Recycle clone
        if: success()
        run: pnpm ops:destroy-branch "$BRANCH_NAME"

      - name: Comment failure on PR + open incident
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `❌ Promote failed for \`${branch}\`. Workflow run: ${runUrl}`
            });
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Prod promote failed for ${branch}`,
              body: `Post-merge promote of \`${branch}\` failed. PR #${context.payload.pull_request.number}. Run: ${runUrl}\n\nRunbook: tasks/option-c-runbook.md section 6 (Promoting a branch to prod) and section 9 (Failure recovery).`,
              labels: ['incident', 'prod-promote-failed']
            });
